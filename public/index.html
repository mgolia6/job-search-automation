<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — Matthew Golia</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0f;
  --surface: #111115;
  --card: #18181d;
  --border: #25252e;
  --border-bright: #35354a;
  --accent: #6366f1;
  --accent-dim: rgba(99,102,241,.15);
  --green: #22d3a0;
  --green-dim: rgba(34,211,160,.12);
  --yellow: #f0b429;
  --yellow-dim: rgba(240,180,41,.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,.12);
  --purple: #c084fc;
  --text: #e4e4f0;
  --muted: #5a5a72;
  --sub: #8888a8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .04em;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 7px; height: 7px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: .4; }
}

.header-right {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* ── Tabs ── */
.tabs {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  gap: 0;
}

.tab {
  padding: 10px 20px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all .15s;
}

.tab:hover { color: var(--sub); }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── Layout ── */
.pane { display: none; padding: 28px; max-width: 1280px; margin: 0 auto; }
.pane.active { display: block; }

/* ── Stats row ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
}

.stat-num {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 6px;
}

.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ── Controls ── */
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
  flex-wrap: wrap;
}

.search {
  flex: 1;
  min-width: 200px;
  padding: 8px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}

.search:focus { border-color: var(--accent); }
.search::placeholder { color: var(--muted); }

.filter-btn {
  padding: 7px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}

.filter-btn:hover { border-color: var(--border-bright); color: var(--sub); }
.filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }

/* ── Table ── */
.table-wrap { overflow-x: auto; }

table { width: 100%; border-collapse: collapse; }

th {
  text-align: left;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

td {
  padding: 11px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:hover td { background: rgba(99,102,241,.03); }

.co-name { font-weight: 600; font-size: 13px; }
.co-type { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.role-cell { max-width: 220px; font-size: 12px; color: var(--sub); }
.date-cell { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
.salary-cell { font-family: var(--mono); font-size: 11px; color: var(--green); white-space: nowrap; }
.warm-cell { font-size: 11px; color: var(--accent); }
.num-cell { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .04em;
  white-space: nowrap;
}

/* ── Edit button ── */
.edit-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--muted);
  padding: 3px 10px;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  transition: all .15s;
}

.edit-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Modal ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 999;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 10px;
  padding: 28px;
  width: 480px;
  max-width: 100%;
}

.modal-company {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.modal-role {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 22px;
}

.field-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  margin-top: 16px;
  display: block;
}

select, textarea {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color .15s;
}

select:focus, textarea:focus { border-color: var(--accent); }
textarea { min-height: 90px; resize: vertical; }

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 22px;
}

.btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  border: none;
}

.btn-cancel { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
.btn-cancel:hover { border-color: var(--border-bright); color: var(--sub); }
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { opacity: .85; }

/* ── Scraper feed ── */
.job-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}

.job-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 20px;
  transition: border-color .15s;
}

.job-card:hover { border-color: var(--border-bright); }

.job-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.job-company { font-weight: 700; font-size: 14px; }
.job-title { font-size: 12px; color: var(--sub); margin-top: 3px; }

.verdict {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .06em;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
}

.verdict-apply { color: var(--green); background: var(--green-dim); }
.verdict-maybe { color: var(--yellow); background: var(--yellow-dim); }
.verdict-pass  { color: var(--red);   background: var(--red-dim); }

.job-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}

.job-meta .sal { color: var(--green); }

.job-gut {
  font-size: 12px;
  color: var(--sub);
  margin-bottom: 14px;
  line-height: 1.5;
}

.apply-link {
  display: inline-block;
  padding: 6px 16px;
  background: var(--accent);
  color: white;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
  transition: opacity .15s;
}

.apply-link:hover { opacity: .8; }

/* ── Empty states ── */
.empty {
  text-align: center;
  padding: 80px 40px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 13px;
}

.empty-icon { font-size: 36px; margin-bottom: 16px; }
.empty-title { color: var(--sub); margin-bottom: 8px; }

/* ── Error ── */
.error-box {
  background: var(--red-dim);
  border: 1px solid rgba(248,113,113,.3);
  border-radius: 8px;
  padding: 16px 20px;
  color: var(--red);
  font-family: var(--mono);
  font-size: 12px;
  margin-bottom: 20px;
}

/* ── Loading ── */
.loading {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 12px;
  padding: 40px;
}

.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 768px) {
  .pane { padding: 16px; }
  header { padding: 0 16px; }
  .tabs { padding: 0 16px; }
  .stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    PIPELINE
  </div>
  <div class="header-right" id="hdr-date"></div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pipeline', this)">Applications</button>
  <button class="tab" onclick="switchTab('scraper', this)">Scraper Feed</button>
</div>

<div id="pane-pipeline" class="pane active">
  <div class="loading"><div class="spinner"></div> Loading pipeline...</div>
</div>

<div id="pane-scraper" class="pane">
  <div class="loading"><div class="spinner"></div> Loading scraper feed...</div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-company" id="modal-meta"></div>
    <div class="modal-role" id="modal-title"></div>
    <input type="hidden" id="modal-id">

    <label class="field-label">Status</label>
    <select id="modal-status">
      <option>Applied</option>
      <option>Screening</option>
      <option>Interviewing</option>
      <option>Offer</option>
      <option>Closed — No</option>
      <option>Closed — Pass</option>
    </select>

    <label class="field-label">Notes</label>
    <textarea id="modal-notes" rows="4"></textarea>

    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
var SUPA_URL = "https://yaepgxsbjtbdkiidxtmf.supabase.co";
var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhZXBneHNianRiZGtpaWR4dG1mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzI4MjksImV4cCI6MjA5NDk0ODgyOX0.UXNAz76lwghgFuC9QLsuVEPq6Njoq1nwLLkEsOQXl0U";

var APPS = [], JOBS = [];
var statusFilter = 'all';
var searchQ = '';

document.getElementById('hdr-date').textContent =
  new Date().toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

var STATUS_CFG = {
  'Applied':       { color:'#60a5fa', bg:'rgba(96,165,250,.12)' },
  'Screening':     { color:'#f0b429', bg:'rgba(240,180,41,.12)' },
  'Interviewing':  { color:'#c084fc', bg:'rgba(192,132,252,.12)' },
  'Offer':         { color:'#22d3a0', bg:'rgba(34,211,160,.12)' },
  'Closed — No':   { color:'#f87171', bg:'rgba(248,113,113,.10)' },
  'Closed — Pass': { color:'#5a5a72', bg:'rgba(90,90,114,.12)' }
};

function badge(status) {
  var cfg = STATUS_CFG[status] || STATUS_CFG['Applied'];
  return '<span class="badge" style="color:' + cfg.color + ';background:' + cfg.bg + '">' + (status || '—') + '</span>';
}

function db(table, params) {
  return fetch(SUPA_URL + '/rest/v1/' + table + (params || ''), {
    headers: { apikey: SUPA_KEY, Authorization: 'Bearer ' + SUPA_KEY }
  }).then(function(r) { return r.json(); });
}

function dbPatch(table, id, body) {
  return fetch(SUPA_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method: 'PATCH',
    headers: {
      apikey: SUPA_KEY,
      Authorization: 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      Prefer: 'return=representation'
    },
    body: JSON.stringify(body)
  }).then(function(r) { return r.json(); });
}

// Load data
Promise.all([
  db('applications', '?order=app_number.asc.nullslast&limit=200'),
  db('jobs', '?order=scraped_at.desc&limit=100')
]).then(function(results) {
  APPS = Array.isArray(results[0]) ? results[0] : [];
  JOBS = Array.isArray(results[1]) ? results[1] : [];
  renderPipeline();
  renderScraper();
}).catch(function(e) {
  document.getElementById('pane-pipeline').innerHTML =
    '<div class="error-box">⚠ Could not connect to database: ' + e.message + '</div>';
});

// ── Pipeline ──────────────────────────────────────────────────────────────────
function renderPipeline() {
  var total   = APPS.length;
  var waiting = APPS.filter(function(a){ return a.status === 'Applied'; }).length;
  var live    = APPS.filter(function(a){ return a.status === 'Screening' || a.status === 'Interviewing'; }).length;
  var warm    = APPS.filter(function(a){ return a.warm_contact && a.warm_contact !== 'None'; }).length;
  var closed  = APPS.filter(function(a){ return (a.status||'').indexOf('Closed') > -1; }).length;

  var filters = ['all','Applied','Screening','Interviewing','Offer','Closed','warm'];
  var filterLabels = { all:'All', warm:'⚡ Warm', Closed:'Closed' };

  var html = '<div class="stats">'
    + stat(total,   '#60a5fa', 'Total Applied')
    + stat(waiting, '#f0b429', 'Awaiting Reply')
    + stat(live,    '#c084fc', 'In Process')
    + stat(warm,    '#6366f1', 'Warm Paths')
    + stat(closed,  '#f87171', 'Closed')
    + '</div>'
    + '<div class="controls">'
    + '<input class="search" type="text" placeholder="Search company, role, contact..." oninput="filterApps(this.value)">'
    + filters.map(function(f) {
        var label = filterLabels[f] || f;
        return '<button class="filter-btn' + (f==='all'?' active':'') + '" onclick="setFilter(\'' + f + '\',this)">' + label + '</button>';
      }).join('')
    + '</div>'
    + '<div class="table-wrap"><table>'
    + '<thead><tr><th>#</th><th>Company</th><th>Role</th><th>Status</th><th>Applied</th><th>Salary</th><th>Contact</th><th></th></tr></thead>'
    + '<tbody id="app-tbody"></tbody></table></div>';

  document.getElementById('pane-pipeline').innerHTML = html;
  renderRows();
}

function stat(num, color, label) {
  return '<div class="stat"><div class="stat-num" style="color:' + color + '">' + num + '</div>'
    + '<div class="stat-label">' + label + '</div></div>';
}

function renderRows() {
  var q = searchQ.toLowerCase();
  var filtered = APPS.filter(function(a) {
    var matchSearch = !q || [a.company, a.role, a.warm_contact, a.recruiter, a.notes]
      .some(function(f){ return (f||'').toLowerCase().indexOf(q) > -1; });
    var matchFilter = statusFilter === 'all' ? true
      : statusFilter === 'warm' ? (!!a.warm_contact && a.warm_contact !== 'None')
      : statusFilter === 'Closed' ? (a.status||'').indexOf('Closed') > -1
      : (a.status||'') === statusFilter;
    return matchSearch && matchFilter;
  });

  var tbody = document.getElementById('app-tbody');
  if (!tbody) return;

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No matches.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(a) {
    var date = a.date_applied
      ? new Date(a.date_applied).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
    var warm = (a.warm_contact && a.warm_contact !== 'None')
      ? '<span class="warm-cell">⚡ ' + a.warm_contact + '</span>' : '';
    var escaped = JSON.stringify(a).replace(/'/g, "\\'");
    return '<tr>'
      + '<td class="num-cell">' + (a.app_number || '?') + '</td>'
      + '<td><div class="co-name">' + (a.company||'') + '</div><div class="co-type">' + (a.role_type||'') + '</div></td>'
      + '<td class="role-cell">' + (a.role||'') + '</td>'
      + '<td>' + badge(a.status) + '</td>'
      + '<td class="date-cell">' + date + '</td>'
      + '<td class="salary-cell">' + (a.salary_range||'—') + '</td>'
      + '<td>' + warm + '</td>'
      + '<td><button class="edit-btn" onclick=\'openModal(' + escaped + ')\'>Edit</button></td>'
      + '</tr>';
  }).join('');
}

function setFilter(f, btn) {
  statusFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderRows();
}

function filterApps(q) { searchQ = q; renderRows(); }

// ── Scraper ───────────────────────────────────────────────────────────────────
function renderScraper() {
  var el = document.getElementById('pane-scraper');
  if (!JOBS.length) {
    el.innerHTML = '<div class="empty">'
      + '<div class="empty-icon">📡</div>'
      + '<div class="empty-title">No scraper results yet</div>'
      + '<div>Runs every 30 min — roles posted in last 5 days only</div>'
      + '</div>';
    return;
  }

  el.innerHTML = '<div class="job-grid">' + JOBS.map(function(j) {
    var gut = (j.gut_check || '').toUpperCase();
    var vclass = gut.indexOf('APPLY') > -1 ? 'verdict-apply'
               : gut.indexOf('MAYBE') > -1 ? 'verdict-maybe' : 'verdict-pass';
    var vtext  = gut.indexOf('APPLY') > -1 ? 'APPLY'
               : gut.indexOf('MAYBE') > -1 ? 'MAYBE' : 'PASS';
    var posted = j.posted_date
      ? new Date(j.posted_date).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';

    return '<div class="job-card">'
      + '<div class="job-card-header">'
      + '<div><div class="job-company">' + (j.company||'') + '</div><div class="job-title">' + (j.title||'') + '</div></div>'
      + (gut ? '<span class="verdict ' + vclass + '">' + vtext + '</span>' : '')
      + '</div>'
      + '<div class="job-meta">'
      + '<span class="sal">' + (j.salary||'Salary N/A') + '</span>'
      + '<span>' + (j.location||'Remote') + '</span>'
      + '<span>' + posted + '</span>'
      + '</div>'
      + (j.gut_check ? '<div class="job-gut">' + j.gut_check + '</div>' : '')
      + (j.apply_url ? '<a class="apply-link" href="' + j.apply_url + '" target="_blank">Apply →</a>' : '')
      + '</div>';
  }).join('') + '</div>';
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(t, btn) {
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.pane').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('pane-' + t).classList.add('active');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(a) {
  document.getElementById('modal-id').value    = a.id;
  document.getElementById('modal-meta').textContent = '#' + (a.app_number||'?') + ' · ' + (a.role_type||'AE');
  document.getElementById('modal-title').textContent = (a.company||'') + ' — ' + (a.role||'');
  document.getElementById('modal-status').value = a.status || 'Applied';
  document.getElementById('modal-notes').value  = a.notes || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeModal();
});

function saveEdit() {
  var id     = document.getElementById('modal-id').value;
  var status = document.getElementById('modal-status').value;
  var notes  = document.getElementById('modal-notes').value;

  dbPatch('applications', id, { status: status, notes: notes, updated_at: new Date() })
    .then(function() {
      for (var i = 0; i < APPS.length; i++) {
        if (APPS[i].id == id) {
          APPS[i].status = status;
          APPS[i].notes  = notes;
          break;
        }
      }
      closeModal();
      renderRows();
    })
    .catch(function(e) {
      alert('Save failed: ' + e.message);
    });
}
</script>
</body>
</html>
