<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Search — Matthew Golia</title>
<style>
  :root {
    --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#6c63ff;
    --green:#22c55e; --yellow:#eab308; --red:#ef4444; --blue:#3b82f6;
    --text:#e2e8f0; --muted:#64748b; --card:#1e2130;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  header h1{font-size:18px;font-weight:700}
  header span{color:var(--muted);font-size:12px}
  .tabs{display:flex;gap:2px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
  .tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);font-weight:500;font-size:13px;transition:all .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover:not(.active){color:var(--text)}
  .pane{display:none;padding:24px}
  .pane.active{display:block}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
  .stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
  .stat-num{font-size:28px;font-weight:800;line-height:1}
  .stat-label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  .blue .stat-num{color:var(--blue)} .yellow .stat-num{color:var(--yellow)} .green .stat-num{color:var(--green)} .red .stat-num{color:var(--red)}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s}
  .filter-btn.active,.filter-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
  .search-bar{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:16px;outline:none}
  .search-bar:focus{border-color:var(--accent)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 12px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
  td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top}
  tr:hover td{background:rgba(108,99,255,.04)}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .b-applied{background:rgba(59,130,246,.15);color:var(--blue)}
  .b-screening{background:rgba(234,179,8,.15);color:var(--yellow)}
  .b-interview{background:rgba(108,99,255,.15);color:var(--accent)}
  .b-offer{background:rgba(34,197,94,.15);color:var(--green)}
  .b-no{background:rgba(239,68,68,.12);color:var(--red)}
  .b-pass{background:rgba(100,116,139,.15);color:var(--muted)}
  .warm{color:var(--accent);font-size:11px}
  .company{font-weight:600}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .salary{font-size:12px;color:var(--green)}
  .edit-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:3px 8px;font-size:11px;cursor:pointer}
  .edit-btn:hover{border-color:var(--accent);color:var(--accent)}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:15px;margin-bottom:16px}
  .modal label{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;margin-top:12px}
  .modal select,.modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:13px;outline:none}
  .modal select:focus,.modal textarea:focus{border-color:var(--accent)}
  .modal textarea{min-height:80px;resize:vertical}
  .modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
  .btn-primary{background:var(--accent);color:white;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:8px 18px;font-size:13px;cursor:pointer}
  .job-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
  .job-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .job-company{font-weight:700;font-size:15px}
  .job-role{color:var(--muted);font-size:13px;margin-top:2px}
  .job-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:8px;flex-wrap:wrap}
  .job-salary{color:var(--green);font-weight:600}
  .apply-link{display:inline-block;margin-top:10px;padding:6px 14px;background:var(--accent);color:white;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none}
  .gut-apply{color:var(--green);font-weight:700}
  .gut-maybe{color:var(--yellow);font-weight:700}
  .gut-pass{color:var(--red);font-weight:700}
  .empty{color:var(--muted);text-align:center;padding:48px}
  .loading{color:var(--muted);text-align:center;padding:48px}
  @media(max-width:600px){.pane{padding:16px}header{padding:12px 16px}.tabs{padding:0 16px;overflow-x:auto}td,th{padding:8px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h1>&#9889; Job Search</h1>
  <span id="hdr-date">Matthew Golia</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="switchTab('pipeline')">Pipeline</div>
  <div class="tab" onclick="switchTab('scraper')">Scraper Feed</div>
</div>
<div id="pane-pipeline" class="pane active"><div class="loading">Loading...</div></div>
<div id="pane-scraper"  class="pane"><div class="loading">Loading...</div></div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Update Application</h3>
    <input type="hidden" id="modal-id">
    <label>Status</label>
    <select id="modal-status">
      <option>Applied</option><option>Screening</option><option>Interviewing</option>
      <option>Offer</option><option>Closed &mdash; No</option><option>Closed &mdash; Pass</option>
    </select>
    <label>Notes</label>
    <textarea id="modal-notes"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
var APPS = [], JOBS = [], statusFilter = 'all', searchQuery = '';

document.getElementById('hdr-date').textContent =
  'Matthew Golia · ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

fetch('/api/data').then(function(r){return r.json()}).then(function(d){
  APPS = d.applications || [];
  JOBS = d.jobs || [];
  renderPipeline();
  renderScraper();
}).catch(function(e){
  document.getElementById('pane-pipeline').innerHTML = '<div class="empty">Error loading data: ' + e.message + '</div>';
});

function badgeClass(s){
  if(!s) return 'b-applied';
  s = s.toLowerCase();
  if(s==='applied') return 'b-applied';
  if(s==='screening') return 'b-screening';
  if(s==='interviewing') return 'b-interview';
  if(s==='offer') return 'b-offer';
  if(s.indexOf('no')>-1) return 'b-no';
  if(s.indexOf('pass')>-1) return 'b-pass';
  return 'b-applied';
}

function renderPipeline(){
  var total=APPS.length,
      active=APPS.filter(function(a){return a.status==='Applied'}).length,
      inter=APPS.filter(function(a){return a.status==='Screening'||a.status==='Interviewing'}).length,
      closed=APPS.filter(function(a){return (a.status||'').indexOf('Closed')>-1}).length;

  var html = '<div class="stats">'
    + '<div class="stat blue"><div class="stat-num">'+total+'</div><div class="stat-label">Total Applied</div></div>'
    + '<div class="stat yellow"><div class="stat-num">'+active+'</div><div class="stat-label">Active</div></div>'
    + '<div class="stat green"><div class="stat-num">'+inter+'</div><div class="stat-label">Interviewing</div></div>'
    + '<div class="stat red"><div class="stat-num">'+closed+'</div><div class="stat-label">Closed</div></div>'
    + '</div>'
    + '<input class="search-bar" type="text" placeholder="Search company, role, contact..." oninput="filterApps(this.value)">'
    + '<div class="filters">'
    + ['all','Applied','Screening','Interviewing','Offer','Closed','Warm'].map(function(f,i){
        return '<button class="filter-btn'+(f==='all'?' active':'')+'" onclick="setFilter(''+f+'',this)">'+f+'</button>';
      }).join('')
    + '</div>'
    + '<div style="overflow-x:auto"><table>'
    + '<thead><tr><th>#</th><th>Company</th><th>Role</th><th>Status</th><th>Date</th><th>Salary</th><th>Contact</th><th></th></tr></thead>'
    + '<tbody id="app-tbody"></tbody></table></div>';

  document.getElementById('pane-pipeline').innerHTML = html;
  renderRows();
}

function renderRows(){
  var q = searchQuery.toLowerCase();
  var filtered = APPS.filter(function(a){
    var ms = !q ||
      (a.company||'').toLowerCase().indexOf(q)>-1 ||
      (a.role||'').toLowerCase().indexOf(q)>-1 ||
      (a.warm_contact||'').toLowerCase().indexOf(q)>-1 ||
      (a.recruiter||'').toLowerCase().indexOf(q)>-1 ||
      (a.notes||'').toLowerCase().indexOf(q)>-1;
    var mf = statusFilter==='all' ? true
      : statusFilter==='Warm' ? (!!a.warm_contact && a.warm_contact!=='None')
      : statusFilter==='Closed' ? (a.status||'').indexOf('Closed')>-1
      : (a.status||'')===statusFilter;
    return ms && mf;
  });

  var tbody = document.getElementById('app-tbody');
  if(!tbody) return;
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="8" class="empty">No matches.</td></tr>';return;}

  tbody.innerHTML = filtered.map(function(a){
    var warm = (a.warm_contact && a.warm_contact!=='None') ? '<div class="warm">&#9889; '+a.warm_contact+'</div>' : '';
    var date = a.date_applied ? new Date(a.date_applied).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '&#8212;';
    var appData = JSON.stringify(a).replace(/"/g,'&quot;');
    return '<tr>'
      +'<td style="color:var(--muted)">#'+(a.app_number||'?')+'</td>'
      +'<td><div class="company">'+a.company+'</div><div class="sub">'+(a.role_type||'')+'</div></td>'
      +'<td style="max-width:200px">'+a.role+'</td>'
      +'<td><span class="badge '+badgeClass(a.status)+'">'+(a.status||'&#8212;')+'</span></td>'
      +'<td style="color:var(--muted);font-size:12px">'+date+'</td>'
      +'<td class="salary">'+(a.salary_range||'&#8212;')+'</td>'
      +'<td>'+warm+'</td>'
      +'<td><button class="edit-btn" onclick="openModal('+appData+')">Edit</button></td>'
      +'</tr>';
  }).join('');
}

function renderScraper(){
  var el = document.getElementById('pane-scraper');
  if(!JOBS.length){el.innerHTML='<div class="empty">No scraper results yet. Runs every 30 min.</div>';return;}
  el.innerHTML = JOBS.map(function(j){
    var gut = j.gut_check||'';
    var gc = gut.indexOf('APPLY')>-1?'gut-apply':gut.indexOf('MAYBE')>-1?'gut-maybe':'gut-pass';
    var posted = j.posted_date ? new Date(j.posted_date).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '&#8212;';
    return '<div class="job-card">'
      +'<div class="job-header"><div><div class="job-company">'+j.company+'</div><div class="job-role">'+j.title+'</div></div>'
      +'<span class="'+gc+'">'+gut.split('&#8212;')[0]+'</span></div>'
      +'<div class="job-meta"><span class="job-salary">'+(j.salary||'Salary N/A')+'</span>'
      +'<span>'+( j.location||'Remote')+'</span><span>'+posted+'</span></div>'
      +(gut?'<div style="margin-top:8px;font-size:12px;color:var(--muted)">'+gut+'</div>':'')
      +(j.apply_url?'<a class="apply-link" href="'+j.apply_url+'" target="_blank">Apply &#8594;</a>':'')
      +'</div>';
  }).join('');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['pipeline','scraper'][i]===t)});
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active')});
  document.getElementById('pane-'+t).classList.add('active');
}

function setFilter(f,btn){
  statusFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  renderRows();
}

function filterApps(q){searchQuery=q;renderRows();}

function openModal(a){
  document.getElementById('modal-id').value = a.id;
  document.getElementById('modal-title').textContent = a.company+' — '+a.role;
  document.getElementById('modal-status').value = a.status||'Applied';
  document.getElementById('modal-notes').value = a.notes||'';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeModal();});

function saveEdit(){
  var id=document.getElementById('modal-id').value;
  var status=document.getElementById('modal-status').value;
  var notes=document.getElementById('modal-notes').value;
  fetch('/api/data',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,status:status,notes:notes})})
    .then(function(){
      var idx=APPS.findIndex(function(a){return a.id===id});
      if(idx>-1){APPS[idx].status=status;APPS[idx].notes=notes;}
      closeModal();renderRows();
    });
}
</script>
</body>
</html>
