name: Job Scraper Cron

on:
  schedule:
    # Runs Mon/Wed/Fri/Sun at 13:00 UTC (~9am ET) — ~16 runs/month
    - cron: '0 13 * * 1,3,5,0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Vercel Function
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://job-search-automation-matthews-projects-fc20f25d.vercel.app/api/cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

